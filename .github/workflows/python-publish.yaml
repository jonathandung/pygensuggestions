name: Build and publish
on:
  release:
    types: [published]
  workflow_dispatch:
jobs:
  publish:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pygensuggestions/${{github.event.release.name}}
    steps:
      - run: |
          RELNAME="${{github.event.release.name}}"
          if [[ ! $RELNAME =~ ^\d+\.(25[0-5]|2[0-4]\d|1\d{2}|[1-9]?\d)\.(25[0-5]|2[0-4]\d|1\d{2}|[1-9]?\d)$ ]]; then
            echo "Release name '$RELNAME' does not match the expected format 'X.Y.Z' where Y and Z are between 0 and 255"
            exit 1
          fi
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          python-version: 3.14
          cache-python: true
          activate-environment: true
      - run: uv build && uv publish